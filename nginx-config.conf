upstream fuxin_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name tkvn.fun 104.223.59.170;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tkvn.fun 104.223.59.170;
    
    ssl_certificate /etc/letsencrypt/live/tkvn.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tkvn.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    client_max_body_size 20M;
    
    # 酒水小店进销存管理系统
    location / {
        root /var/www/fuxin;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
    
    # 酒水小店进销存管理系统API
    location /api {
        proxy_pass http://fuxin_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 启用gzip压缩
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;
    gzip_vary on;
    gzip_min_length 1024;
    
    # 静态文件缓存配置
    location ~* ^/(css|js|fonts)/.*\.(css|js|woff|woff2|ttf|eot|svg)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Vary Accept-Encoding;
        access_log off;
        try_files $uri =404;
    }
}
